<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Lost &amp; Found Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { 
      --primary: #0066FF; 
      --primary-hover: #0052cc;
      --bg-gradient: linear-gradient(135deg, #eef2ff 0%, #fae8ff 100%);
      --surface: #ffffff;
      --text-dark: #1e293b;
      --text-muted: #64748b;
      --border-light: #f1f5f9;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .login-card {
      background: var(--surface);
      width: 100%;
      max-width: 400px;
      padding: 2.5rem;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      border: 1px solid var(--border-light);
    }

    .login-header { text-align: center; margin-bottom: 2rem; }
    .login-icon {
      width: 48px; height: 48px;
      background: var(--primary); color: white;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: bold;
      margin: 0 auto 1rem;
    }
    .login-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .login-header p { font-size: 0.85rem; color: var(--text-muted); }

    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--text-dark); margin-bottom: 0.5rem;
    }
    .form-control {
      width: 100%; padding: 0.75rem 1rem;
      border: 1px solid var(--border-light); border-radius: 12px;
      font-family: inherit; font-size: 0.9rem;
      background: #f8fafc; outline: none;
      transition: all 0.2s;
    }
    .form-control:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(0,102,255,0.1); }

    .btn-login {
      width: 100%; padding: 0.8rem;
      background: var(--primary); color: white;
      border: none; border-radius: 12px;
      font-weight: 600; font-size: 0.9rem;
      cursor: pointer; margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--primary-hover); }

    .alert-error {
      background: #fff1f2; color: #e11d48;
      border-radius: 12px; padding: 0.75rem 1rem;
      font-size: 0.85rem; margin-bottom: 1.5rem;
      text-align: center;
    }
    .login-hint {
      margin-top: 2rem; text-align: center;
      font-size: 0.75rem; color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">L</div>
      <h1>Admin Portal</h1>
      <p>Sistem Manajemen Barang Hilang & Temuan</p>
    </div>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password" />
      </div>
      <button class="btn-login" type="submit">Log in</button>
    </form>

    <div class="login-hint">
      Default: admin / admin123
    </div>
  </div>
</body>
</html>
